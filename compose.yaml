services:
  obs-mcp:
    build:
      context: .
      dockerfile: Containerfile
    environment:
      - PROMETHEUS_URL=http://${CONTAINER_HOST_GATEWAY:-host.docker.internal}:9090
      - ALERTMANAGER_URL=http://${CONTAINER_HOST_GATEWAY:-host.docker.internal}:9093
    ports:
      - "9100:8080"

  inspector:
    image: ghcr.io/modelcontextprotocol/inspector:latest
    environment:
      - HOST=0.0.0.0
      - MCP_AUTO_OPEN_ENABLED=false
    ports:
      - "6274:6274"
      - "6277:6277"
