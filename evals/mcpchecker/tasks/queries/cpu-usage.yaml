kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  name: "cpu-usage"
  difficulty: medium
  parallel: true
  runs: 1
  labels:
    category: queries
    suite: observability
    toolType: query
  description: |
    Tests if the agent can find the appropriate CPU usage metric and query it to
    determine which pods are consuming the most CPU resources.
spec:
  verify:
    - llmJudge:
        contains: "container_cpu_usage_seconds_total"
    - llmJudge:
        contains: "pod"
  prompt:
    inline: |
      Which pods are using the most CPU? Show me the top 5.
      Use Prometheus metrics and include the metric name and PromQL query you used.
