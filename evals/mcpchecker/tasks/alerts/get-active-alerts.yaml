kind: Task
apiVersion: mcpchecker/v1alpha2
metadata:
  name: "get-active-alerts"
  difficulty: easy
  description: |
    Tests if the agent can use the get_alerts tool with the active filter
    parameter to show only non-silenced alerts.
spec:
  verify:
    - llmJudge:
        contains: "active"
        reason: "Verify the output specifically addresses active (non-silenced) alerts"
  prompt:
    inline: |
      Show me only the active (non-silenced) alerts.
