kind: Eval
metadata:
  name: "obs-mcp-tools"

config:
  agent:
    type: "builtin.llm-agent"
    model: "openai:gpt-4o-mini"

  mcpConfigFile: mcp-config.yaml

  llmJudge:
    env:
      baseUrlKey: JUDGE_BASE_URL
      apiKeyKey: JUDGE_API_KEY
      modelNameKey: JUDGE_MODEL_NAME

  taskSets:
    # Metric discovery
    - path: tasks/metrics/list-metrics.yaml
      assertions:
        toolsUsed:
          - server: obs
            tool: list_metrics
        minToolCalls: 1
        maxToolCalls: 5

    - path: tasks/metrics/list-node-metrics.yaml
      assertions:
        toolsUsed:
          - server: obs
            tool: list_metrics
        minToolCalls: 1
        maxToolCalls: 5

    # Label exploration
    - path: tasks/labels/label-names.yaml
      assertions:
        toolsUsed:
          - server: obs
            tool: list_metrics
          - server: obs
            tool: get_label_names
        callOrder:
          - type: tool
            server: obs
            name: list_metrics
          - type: tool
            server: obs
            name: get_label_names
        minToolCalls: 2
        maxToolCalls: 7

    - path: tasks/labels/label-values.yaml
      assertions:
        toolsUsed:
          - server: obs
            tool: list_metrics
          - server: obs
            tool: get_label_names
          - server: obs
            tool: get_label_values
        callOrder:
          - type: tool
            server: obs
            name: list_metrics
          - type: tool
            server: obs
            name: get_label_names
          - type: tool
            server: obs
            name: get_label_values
        minToolCalls: 3
        maxToolCalls: 7

    - path: tasks/labels/get-series.yaml
      assertions:
        toolsUsed:
          - server: obs
            tool: list_metrics
          - server: obs
            tool: get_series
        callOrder:
          - type: tool
            server: obs
            name: list_metrics
          - type: tool
            server: obs
            name: get_series
        minToolCalls: 2
        maxToolCalls: 7

    # Instant / range queries (agent may legitimately use either query type)
    - path: tasks/queries/pending-pods.yaml
      assertions:
        toolsUsed:
          - server: obs
            tool: list_metrics
          - server: obs
            toolPattern: "(execute_instant_query|execute_range_query)"
        callOrder:
          - type: tool
            server: obs
            name: list_metrics
        minToolCalls: 2
        maxToolCalls: 15

    - path: tasks/queries/cpu-usage.yaml
      assertions:
        toolsUsed:
          - server: obs
            tool: list_metrics
          - server: obs
            toolPattern: "(execute_instant_query|execute_range_query)"
        callOrder:
          - type: tool
            server: obs
            name: list_metrics
        minToolCalls: 2
        maxToolCalls: 15

    - path: tasks/queries/network-traffic.yaml
      assertions:
        toolsUsed:
          - server: obs
            tool: list_metrics
          - server: obs
            toolPattern: "(execute_instant_query|execute_range_query)"
        callOrder:
          - type: tool
            server: obs
            name: list_metrics
        minToolCalls: 2
        maxToolCalls: 15

    - path: tasks/queries/prometheus-head-series.yaml
      assertions:
        toolsUsed:
          - server: obs
            tool: list_metrics
          - server: obs
            toolPattern: "(execute_instant_query|execute_range_query)"
        callOrder:
          - type: tool
            server: obs
            name: list_metrics
        minToolCalls: 2
        maxToolCalls: 15

    - path: tasks/queries/prometheus-requests.yaml
      assertions:
        toolsUsed:
          - server: obs
            tool: list_metrics
          - server: obs
            toolPattern: "(execute_instant_query|execute_range_query)"
        callOrder:
          - type: tool
            server: obs
            name: list_metrics
        minToolCalls: 2
        maxToolCalls: 15

    - path: tasks/queries/prometheus-wal-size.yaml
      assertions:
        toolsUsed:
          - server: obs
            tool: list_metrics
          - server: obs
            toolPattern: "(execute_instant_query|execute_range_query)"
        callOrder:
          - type: tool
            server: obs
            name: list_metrics
        minToolCalls: 2
        maxToolCalls: 15

    # Range queries
    - path: tasks/queries/pods-created.yaml
      assertions:
        toolsUsed:
          - server: obs
            tool: list_metrics
          - server: obs
            tool: execute_range_query
        callOrder:
          - type: tool
            server: obs
            name: list_metrics
          - type: tool
            server: obs
            name: execute_range_query
        minToolCalls: 2
        maxToolCalls: 7

    - path: tasks/queries/crashlooping-pods.yaml
      assertions:
        toolsUsed:
          - server: obs
            tool: list_metrics
          - server: obs
            tool: execute_range_query
        callOrder:
          - type: tool
            server: obs
            name: list_metrics
          - type: tool
            server: obs
            name: execute_range_query
        minToolCalls: 2
        maxToolCalls: 7

    # Alertmanager
    - path: tasks/alerts/get-alerts.yaml
      assertions:
        toolsUsed:
          - server: obs
            tool: get_alerts
        minToolCalls: 1
        maxToolCalls: 5

    - path: tasks/alerts/alert-investigation.yaml
      assertions:
        toolsUsed:
          - server: obs
            tool: get_alerts
          - server: obs
            toolPattern: "(list_metrics|execute_instant_query|execute_range_query)"
        minToolCalls: 2
        maxToolCalls: 15

    - path: tasks/alerts/get-silences.yaml
      assertions:
        toolsUsed:
          - server: obs
            tool: get_silences
        minToolCalls: 1
        maxToolCalls: 5

    # Multi-step reasoning (hard)
    - path: tasks/queries/namespace-resource-usage.yaml
      assertions:
        toolsUsed:
          - server: obs
            tool: list_metrics
          - server: obs
            toolPattern: "(execute_instant_query|execute_range_query)"
        callOrder:
          - type: tool
            server: obs
            name: list_metrics
        minToolCalls: 3
        maxToolCalls: 15

    # Ambiguous diagnostic (hard)
    - path: tasks/queries/diagnose-cluster-health.yaml
      assertions:
        minToolCalls: 3
        maxToolCalls: 20
