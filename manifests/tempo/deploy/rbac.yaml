apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: obs-mcp-tracing
rules:
  # Required for tracing toolset to discover Tempo instances
  - apiGroups: ["tempo.grafana.com"]
    resources: ["tempostacks", "tempomonolithics"]
    verbs: ["list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: obs-mcp-tracing
subjects:
  - kind: ServiceAccount
    name: obs-mcp
    namespace: obs-mcp
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: obs-mcp-tracing
