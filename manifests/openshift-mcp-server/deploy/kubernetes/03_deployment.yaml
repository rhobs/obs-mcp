apiVersion: apps/v1
kind: Deployment
metadata:
  name: openshift-mcp-server
  labels:
    app.kubernetes.io/name: openshift-mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openshift-mcp-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openshift-mcp-server
    spec:
      serviceAccountName: openshift-mcp-server
      automountServiceAccountToken: true
      containers:
        - name: openshift-mcp-server
          image: ghcr.io/rhobs/openshift-mcp-server:latest
          imagePullPolicy: IfNotPresent
          args:
            - --config
            - /etc/openshift-mcp-server/config.toml
            - --port
            - "9100"
            - --log-level
            - "4"
          ports:
            - containerPort: 9100
              name: mcp
          volumeMounts:
            - name: config
              mountPath: /etc/openshift-mcp-server
              readOnly: true
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          livenessProbe:
            httpGet:
              path: /healthz
              port: mcp
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: mcp
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: openshift-mcp-server
